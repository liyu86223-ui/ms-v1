<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chunk Battery Demo</title>
  <style>
    :root {
      --ink: #34364b;
      --muted: #777b90;
      --panel: #ffffff;
      --line: #e4e6ee;
      --green: #69d96e;
      --green-dark: #2ea34c;
      --blue: #72c9ff;
      --purple: #c594ff;
      --violet: #7b6dff;
      --orange: #ff9556;
      --red: #ff5c66;
      --shadow: 0 16px 40px rgba(25, 31, 56, .18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #202535;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 980px);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 393px minmax(280px, 1fr);
      gap: 28px;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      overflow: hidden;
      background: #fff2eb;
      box-shadow: var(--shadow);
    }

    .scene {
      position: absolute;
      inset: 0 0 auto;
      height: 318px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 30%),
        linear-gradient(180deg, #ffa467 0%, #ffc291 48%, #fff2eb 49%, #fff6f0 100%);
    }

    .scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 96px;
      opacity: .28;
      background-image:
        linear-gradient(90deg, #ffd7c5 1px, transparent 1px),
        linear-gradient(#ffd7c5 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .shelf,
    .fridge,
    .cabinet {
      position: absolute;
      border-radius: 6px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.08), 0 5px 9px rgba(90, 46, 18, .18);
    }

    .fridge {
      left: 26px;
      top: 112px;
      width: 72px;
      height: 92px;
      background: linear-gradient(90deg, #fff6a8 0 14%, #a9def0 14% 49%, #ffd36b 49% 54%, #a9def0 54% 100%);
      border: 4px solid #ffd05e;
    }

    .shelf {
      left: 125px;
      top: 126px;
      width: 94px;
      height: 76px;
      background: linear-gradient(#b36b42 0 12px, #f6d3a9 12px 22px, #b36b42 22px 34px, #f6d3a9 34px 46px, #b36b42 46px 100%);
    }

    .cabinet {
      right: 43px;
      top: 109px;
      width: 96px;
      height: 94px;
      background: linear-gradient(90deg, #8ed8e6 0 48%, #5f361f 48% 52%, #8ed8e6 52%);
      border: 4px solid #5f361f;
    }

    .nav {
      position: absolute;
      z-index: 4;
      top: 13px;
      left: 14px;
      right: 14px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .back {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: #9ba0b2;
      font-size: 26px;
      line-height: 1;
    }

    .meters {
      display: flex;
      gap: 7px;
      align-items: center;
      font-weight: 800;
      color: #464b67;
      font-size: 15px;
    }

    .top-battery,
    .heart {
      height: 27px;
      min-width: 78px;
      border-radius: 999px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.08);
    }

    .battery-icon {
      position: relative;
      width: 25px;
      height: 15px;
      border: 2px solid #29b8e9;
      border-radius: 4px;
      transform: rotate(-18deg);
      background: #edfaff;
      overflow: visible;
    }

    .battery-icon::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 6px;
      border-radius: 1px;
      background: #29b8e9;
    }

    .battery-fill {
      height: 100%;
      width: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #80e66f, #2fc7eb);
      transform-origin: left center;
      transition: transform .08s linear, background .18s ease;
    }

    .heart {
      min-width: 70px;
    }

    .heart-mark {
      color: #ff5b6a;
      font-size: 20px;
      transform: translateY(-1px);
    }

    .characters {
      position: absolute;
      z-index: 2;
      top: 184px;
      left: 42px;
      right: 16px;
      height: 92px;
      display: flex;
      align-items: end;
      justify-content: space-between;
    }

    .animal,
    .teacher {
      position: relative;
      width: 43px;
      height: 72px;
      filter: drop-shadow(0 4px 2px rgba(0,0,0,.12));
    }

    .animal::before,
    .teacher::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--c);
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.10);
    }

    .animal::after,
    .teacher::after {
      content: "";
      position: absolute;
      left: 4px;
      bottom: 0;
      width: 35px;
      height: 48px;
      border-radius: 18px 18px 12px 12px;
      background: var(--c2);
      box-shadow: inset 0 -6px 0 rgba(0,0,0,.08);
    }

    .teacher {
      width: 48px;
      height: 88px;
      margin-left: 10px;
    }

    .dialogue {
      position: absolute;
      z-index: 5;
      left: 30px;
      right: 30px;
      top: 294px;
      height: 90px;
      border-radius: 16px;
      background: #3b3a40;
      color: #fff;
      padding: 17px 22px 16px 90px;
      box-shadow: inset 0 4px 0 rgba(255,255,255,.12);
    }

    .lily {
      position: absolute;
      left: -5px;
      bottom: -12px;
      width: 92px;
      height: 92px;
      border-radius: 46px 46px 24px 24px;
      background: radial-gradient(circle at 35% 35%, #fff 0 6px, transparent 7px),
        radial-gradient(circle at 65% 35%, #fff 0 6px, transparent 7px),
        radial-gradient(circle at 35% 35%, #31313a 0 3px, transparent 4px),
        radial-gradient(circle at 65% 35%, #31313a 0 3px, transparent 4px),
        #8d8a7b;
      border: 5px solid #d8d5ca;
    }

    .lily::after {
      content: "Lily";
      position: absolute;
      left: 22px;
      bottom: 2px;
      color: #fff;
      font-weight: 800;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }

    .dialogue small {
      display: block;
      color: #bcbac5;
      margin-bottom: 3px;
    }

    .dialogue strong {
      font-size: 20px;
      font-weight: 650;
    }

    .translator {
      position: absolute;
      z-index: 6;
      left: 26px;
      right: 26px;
      bottom: 20px;
      height: 452px;
      border-radius: 20px 20px 0 0;
      background: #fff;
      border: 4px solid #d9dce4;
      box-shadow: 0 -10px 24px rgba(30, 40, 65, .12);
      padding: 44px 18px 20px;
    }

    .translator::before {
      content: "Translator";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: #b7bbc8;
      font-size: 12px;
    }

    .answer-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 14px;
      margin-bottom: 54px;
    }

    .answer-row.complete {
      padding-left: 0;
      margin-bottom: 38px;
    }

    .slot {
      width: 82px;
      height: 58px;
      border-radius: 12px;
      background: #f0f1f5;
      display: grid;
      place-items: center;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .slot.short {
      width: 52px;
    }

    .slot.filled {
      background: transparent;
    }

    .slot.pop {
      animation: pop .24s ease;
    }

    .choices {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 14px;
      flex-wrap: wrap;
      min-height: 80px;
      transition: opacity .2s ease, transform .2s ease;
    }

    .choices.finished {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .chunk {
      position: relative;
      width: 82px;
      height: 58px;
      border: 0;
      border-radius: 13px;
      color: var(--ink);
      background: #fff;
      box-shadow: 0 6px 0 rgba(35, 45, 65, .05);
      padding: 8px 6px;
      font: inherit;
      cursor: pointer;
      transition: transform .14s ease, filter .18s ease, opacity .18s ease, box-shadow .18s ease;
      overflow: hidden;
      isolation: isolate;
    }

    .chunk.short {
      width: 52px;
    }

    .chunk:disabled {
      cursor: default;
      opacity: .38;
      transform: none;
    }

    .chunk:hover:not(:disabled) {
      transform: translateY(-3px);
    }

    .chunk .charge {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(90deg, #a6f28d, #65e684);
      transform-origin: bottom center;
      transform: scaleY(1);
      transition: transform .08s linear, background .18s ease, opacity .18s ease;
    }

    .chunk .romaji {
      display: block;
      font-size: 11px;
      color: #71818d;
      line-height: 1.05;
    }

    .chunk .kana {
      display: block;
      font-size: 16px;
      font-weight: 750;
      line-height: 1.15;
    }

    .chunk.normal {
      background: #fff;
      border: 1px solid #eceef4;
    }

    .chunk.normal .charge {
      opacity: 0;
    }

    .chunk.good {
      background: #bff5dc;
      box-shadow: 0 7px 0 rgba(39, 168, 95, .18);
    }

    .chunk.good .charge {
      opacity: 0;
    }

    .chunk.premium {
      color: #fff;
      background: linear-gradient(135deg, #64d3ff 0%, #8d7aff 52%, #dba5ff 100%);
      box-shadow: 0 0 0 3px rgba(126, 105, 255, .2), 0 10px 22px rgba(125, 100, 255, .32);
    }

    .chunk.premium .charge {
      opacity: 0;
    }

    .chunk.premium .romaji,
    .chunk.premium .kana {
      color: #fff;
    }

    .chunk.wrong {
      animation: shake .26s ease;
      box-shadow: 0 0 0 3px rgba(255, 92, 102, .22);
    }

    .sentence {
      width: 265px;
      min-height: 68px;
      border-radius: 14px;
      display: grid;
      align-content: center;
      justify-items: center;
      padding: 9px 14px;
      animation: merge .3s ease;
      box-shadow: 0 8px 0 rgba(35, 45, 65, .05);
    }

    .sentence.good {
      background: #bff5dc;
      box-shadow: 0 8px 0 rgba(39, 168, 95, .18);
    }

    .sentence.premium {
      color: #fff;
      background: linear-gradient(135deg, #64d3ff 0%, #8d7aff 52%, #dba5ff 100%);
      box-shadow: 0 0 0 3px rgba(126, 105, 255, .20), 0 12px 26px rgba(125, 100, 255, .34);
    }

    .sentence-romaji,
    .sentence-kana {
      width: 100%;
      text-align: center;
      color: inherit;
      white-space: nowrap;
    }

    .sentence-romaji {
      font-size: 11px;
      opacity: .7;
      line-height: 1.1;
      word-spacing: 18px;
    }

    .sentence-kana {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .next {
      position: absolute;
      right: 32px;
      bottom: 28px;
      width: 104px;
      height: 34px;
      border: 0;
      border-radius: 17px;
      color: #fff;
      font-weight: 800;
      background: #4778f4;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .next.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      background: rgba(34, 37, 53, .92);
      color: #fff;
      font-weight: 750;
      padding: 10px 14px;
      border-radius: 999px;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .spark {
      position: absolute;
      z-index: 20;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd75a;
      box-shadow: 0 0 12px #ffd75a;
      pointer-events: none;
      animation: spark .48s ease forwards;
    }

    .side {
      align-self: center;
      color: #fff;
      display: grid;
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .card h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.15;
    }

    .state {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border-radius: 999px;
      padding: 6px 12px;
      color: #182136;
      background: #b8f5cf;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .state.premium {
      color: #fff;
      background: linear-gradient(135deg, #55c8ff, #9c7dff, #dca4ff);
    }

    .state.normal {
      background: #f4f5f9;
    }

    .state.fail {
      background: #ffe0d3;
    }

    .rule {
      color: rgba(255,255,255,.78);
      font-size: 14px;
      line-height: 1.55;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .control {
      min-width: 96px;
      height: 38px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 12px;
      font-weight: 750;
      cursor: pointer;
    }

    .control.active {
      background: #fff;
      color: #273047;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
      margin-top: 12px;
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #78e872, #31c9ea);
      transform-origin: left center;
    }

    @keyframes pop {
      0% { transform: scale(.92); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    @keyframes merge {
      0% { opacity: .4; transform: scale(.96); }
      70% { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes spark {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.2); }
    }

    @media (max-width: 820px) {
      .stage {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .phone {
        transform-origin: top center;
        transform: scale(min(1, calc((100vw - 28px) / 393)));
        margin-bottom: calc(-852px + min(852px, (100vw - 28px) / 393 * 852px));
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="chunk battery interactive demo">
      <div class="scene">
        <div class="fridge"></div>
        <div class="shelf"></div>
        <div class="cabinet"></div>
      </div>

      <div class="nav">
        <div class="back">‹</div>
        <div class="meters">
          <div class="top-battery" id="batteryMeter">
            <span class="battery-icon"><span class="battery-fill" id="topBatteryFill"></span></span>
            <span id="batteryText">2/20</span>
          </div>
          <div class="heart"><span class="heart-mark">♥</span><span>33</span></div>
        </div>
      </div>

      <div class="characters">
        <div class="animal" style="--c:#7b806d;--c2:#77633f"></div>
        <div class="teacher" style="--c:#d28b5b;--c2:#c65f42"></div>
        <div class="animal" style="--c:#e6b452;--c2:#f0c456"></div>
        <div class="animal" style="--c:#8b5a36;--c2:#cc7f28"></div>
        <div class="animal" style="--c:#bfc3c8;--c2:#2d3440"></div>
      </div>

      <div class="dialogue">
        <div class="lily"></div>
        <small>请翻译：</small>
        <strong>商场在哪里？</strong>
      </div>

      <div class="translator">
        <div class="answer-row" id="answerRow">
          <div class="slot" data-slot="0"></div>
          <div class="slot short" data-slot="1"></div>
          <div class="slot short" data-slot="2"></div>
        </div>

        <div class="choices" id="choices"></div>
        <button class="next" id="nextButton">下一题</button>
        <div class="toast" id="toast"></div>
      </div>
    </section>

    <aside class="side">
      <div class="card">
        <div class="state" id="statePill">满电待答</div>
        <h1>拼 chunk 掉电体验</h1>
        <p class="rule" id="stateCopy">
          点第一个 chunk 后开始掉电。在电量耗尽前按正确顺序一次拼对，会进入蓝紫色高级状态。
        </p>
        <div class="bar"><div class="bar-fill" id="sideFill"></div></div>
      </div>

      <div class="card">
        <div class="controls">
          <button class="control active" data-duration="5200">正常速度</button>
          <button class="control" data-duration="8000">慢速体验</button>
          <button class="control" id="resetButton">重来</button>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const questions = [
      {
        id: "mall",
        cn: "商场在哪里？",
        sentenceRomaji: "depāto wa doko desu ka",
        sentenceKana: "デパートはどこですか",
        tokens: [
          { id: "depato", romaji: "depāto", kana: "デパート", width: "" },
          { id: "wa", romaji: "wa", kana: "は", width: "short" },
          { id: "doko", romaji: "doko", kana: "どこ", width: "short" },
          { id: "desuka", romaji: "desu ka", kana: "ですか", width: "" }
        ],
        distractors: [
          { id: "toire", romaji: "toire", kana: "トイレ", width: "" },
          { id: "reji", romaji: "reji", kana: "レジ", width: "short" }
        ]
      },
      {
        id: "toilet",
        cn: "厕所在哪里？",
        sentenceRomaji: "toire wa doko desu ka",
        sentenceKana: "トイレはどこですか",
        tokens: [
          { id: "toire", romaji: "toire", kana: "トイレ", width: "" },
          { id: "wa", romaji: "wa", kana: "は", width: "short" },
          { id: "doko", romaji: "doko", kana: "どこ", width: "short" },
          { id: "desuka", romaji: "desu ka", kana: "ですか", width: "" }
        ],
        distractors: [
          { id: "depato", romaji: "depāto", kana: "デパート", width: "" },
          { id: "reji", romaji: "reji", kana: "レジ", width: "short" }
        ]
      },
      {
        id: "cashier",
        cn: "收银台在哪里？",
        sentenceRomaji: "reji wa doko desu ka",
        sentenceKana: "レジはどこですか",
        tokens: [
          { id: "reji", romaji: "reji", kana: "レジ", width: "" },
          { id: "wa", romaji: "wa", kana: "は", width: "short" },
          { id: "doko", romaji: "doko", kana: "どこ", width: "short" },
          { id: "desuka", romaji: "desu ka", kana: "ですか", width: "" }
        ],
        distractors: [
          { id: "depato", romaji: "depāto", kana: "デパート", width: "" },
          { id: "toire", romaji: "toire", kana: "トイレ", width: "" }
        ]
      }
    ];

    const choicesEl = document.querySelector("#choices");
    const answerRow = document.querySelector("#answerRow");
    let slotEls = [...document.querySelectorAll(".slot")];
    const topFill = document.querySelector("#topBatteryFill");
    const sideFill = document.querySelector("#sideFill");
    const batteryText = document.querySelector("#batteryText");
    const batteryMeter = document.querySelector("#batteryMeter");
    const statePill = document.querySelector("#statePill");
    const stateCopy = document.querySelector("#stateCopy");
    const toast = document.querySelector("#toast");
    const nextButton = document.querySelector("#nextButton");
    const resetButton = document.querySelector("#resetButton");
    const durationButtons = [...document.querySelectorAll("[data-duration]")];

    let selected = [];
    let startedAt = 0;
    let duration = 5200;
    let raf = 0;
    let degraded = false;
    let completed = false;
    let started = false;
    let charge = 1;
    let mastered = 0;
    let queue = [...questions];
    let shuffleSeed = Date.now();

    function currentQuestion() {
      return queue[0];
    }

    function currentTarget() {
      return currentQuestion().tokens.map(token => token.id);
    }

    function renderSlots() {
      const question = currentQuestion();
      answerRow.classList.remove("complete");
      answerRow.innerHTML = question.tokens.map((token, index) => (
        `<div class="slot ${token.width}" data-slot="${index}"></div>`
      )).join("");
      slotEls = [...document.querySelectorAll(".slot")];
    }

    function renderChoices() {
      const question = currentQuestion();
      choicesEl.classList.remove("finished");
      choicesEl.innerHTML = "";
      shuffleChoices([...question.tokens, ...question.distractors]).forEach(chunk => {
        const button = document.createElement("button");
        button.className = `chunk ${chunk.width}`;
        button.dataset.id = chunk.id;
        button.innerHTML = `
          <span class="charge"></span>
          <span class="romaji">${chunk.romaji}</span>
          <span class="kana">${chunk.kana}</span>
        `;
        button.addEventListener("click", () => pickChunk(chunk.id, button));
        choicesEl.appendChild(button);
      });
    }

    function seededRandom() {
      shuffleSeed = (shuffleSeed * 1664525 + 1013904223) >>> 0;
      return shuffleSeed / 4294967296;
    }

    function shuffleChoices(items) {
      const mixed = [...items];
      for (let i = mixed.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom() * (i + 1));
        [mixed[i], mixed[j]] = [mixed[j], mixed[i]];
      }
      return mixed;
    }

    function renderQuestionText() {
      document.querySelector(".dialogue strong").textContent = currentQuestion().cn;
    }

    function updateProgressUI() {
      const progress = mastered / questions.length;
      topFill.style.transform = `scaleX(${progress})`;
      batteryText.textContent = `${mastered}/${questions.length}`;
      if (mastered === questions.length) {
        topFill.style.background = "linear-gradient(90deg, #64d3ff, #8d7aff, #dba5ff)";
      }
    }

    function setState(kind, label, copy) {
      statePill.className = `state ${kind || ""}`;
      statePill.textContent = label;
      stateCopy.textContent = copy;
    }

    function startTimer() {
      if (started || completed) return;
      started = true;
      startedAt = performance.now();
      tick();
    }

    function tick() {
      if (!started || completed) return;
      const elapsed = performance.now() - startedAt;
      charge = Math.max(0, 1 - elapsed / duration);
      updateChargeUI();
      if (charge <= 0) {
        drain();
        return;
      }
      raf = requestAnimationFrame(tick);
    }

    function updateChargeUI() {
      sideFill.style.transform = `scaleX(${charge})`;
      document.querySelectorAll(".chunk .charge").forEach(el => {
        el.style.transform = `scaleY(${charge})`;
      });
      if (charge < .35) {
        sideFill.style.background = "linear-gradient(90deg, #ffb45c, #ff6d5c)";
      }
    }

    function pickChunk(id, el) {
      if (completed) return;
      startTimer();
      const expected = currentTarget()[selected.length];
      if (id !== expected) {
        el.classList.add("wrong");
        setTimeout(() => el.classList.remove("wrong"), 280);
        degrade("答错降级", "任意 chunk 答错后，剩余 chunk 变白；拼对后只进入普通绿色状态。");
        showToast("答错，速度奖励消失");
        return;
      }
      selected.push(id);
      placeChunk(id);
      el.disabled = true;
      el.style.visibility = "hidden";
      burstFrom(el);
      if (selected.length === currentTarget().length) {
        finish();
      } else if (!degraded) {
        setState("", "掉电中", "继续拼。电量耗尽前一次拼对，会保留高级状态机会。");
      }
    }

    function makeChunkNode(id, finalClass) {
      const data = currentQuestion().tokens.find(c => c.id === id);
      const node = document.createElement("div");
      node.className = `chunk ${data.width} ${finalClass || ""}`;
      node.innerHTML = `<span class="charge"></span><span class="romaji">${data.romaji}</span><span class="kana">${data.kana}</span>`;
      node.querySelector(".charge").style.transform = `scaleY(${charge})`;
      return node;
    }

    function makeSentenceNode(finalClass) {
      const question = currentQuestion();
      const sentence = document.createElement("div");
      sentence.className = `sentence ${finalClass}`;
      sentence.innerHTML = `
        <span class="sentence-romaji">${question.sentenceRomaji}</span>
        <span class="sentence-kana">${question.sentenceKana}</span>
      `;
      return sentence;
    }

    function placeChunk(id) {
      const index = selected.length - 1;
      const slot = slotEls[index];
      slot.innerHTML = "";
      slot.classList.add("filled", "pop");
      slot.appendChild(makeChunkNode(id, degraded ? "good" : "premium"));
      setTimeout(() => slot.classList.remove("pop"), 260);
    }

    function degrade(label, copy) {
      if (degraded || completed) return;
      degraded = true;
      cancelAnimationFrame(raf);
      batteryMeter.animate([
        { transform: "translateX(0) scale(1)" },
        { transform: "translateX(-4px) scale(1.06)" },
        { transform: "translateX(4px) scale(1.06)" },
        { transform: "translateX(0) scale(1)" }
      ], { duration: 260, easing: "ease-out" });
      for (let i = 0; i < 7; i++) createSpark(248 + Math.random() * 30, 48 + Math.random() * 12, true);
      document.querySelectorAll(".chunk").forEach(node => node.classList.add("normal"));
      slotEls.forEach(slot => {
        const node = slot.querySelector(".chunk");
        if (node) {
          node.classList.remove("premium");
          node.classList.add("good");
        }
      });
      charge = 0;
      updateChargeUI();
      setState("fail", label, copy);
    }

    function drain() {
      degrade("电量耗尽", "电量耗尽后，chunk 退回白色；后续拼对只获得普通绿色完成反馈。");
      showToast("电量耗尽");
    }

    function finish() {
      completed = true;
      cancelAnimationFrame(raf);
      const className = degraded ? "good" : "premium";
      answerRow.innerHTML = "";
      answerRow.classList.add("complete");
      answerRow.appendChild(makeSentenceNode(className));
      choicesEl.classList.add("finished");
      document.querySelectorAll(".choices .chunk").forEach(node => {
        node.disabled = true;
      });
      nextButton.classList.add("show");
      if (degraded) {
        const missed = queue.shift();
        queue.push(missed);
        setState("normal", "普通完成", "句子拼对了，但速度奖励已经消失，所以呈现普通绿色状态。");
        showToast("普通完成");
      } else {
        queue.shift();
        mastered += 1;
        updateProgressUI();
        batteryMeter.animate([
          { transform: "scale(1)" },
          { transform: "scale(1.12)" },
          { transform: "scale(1)" }
        ], { duration: 280, easing: "ease-out" });
        if (mastered === questions.length) {
          nextButton.textContent = "完成";
          setState("premium", "本关完成", "三句话都以高级状态拼完了，右上角电池已充满。");
        } else {
          setState("premium", "高级完成", "电量耗尽前一次拼对，右上角电池进度 +1。");
        }
        for (let i = 0; i < 14; i++) createSpark(90 + Math.random() * 170, 470 + Math.random() * 80, false);
      }
    }

    function nextQuestion() {
      if (!completed || mastered === questions.length) return;
      selected = [];
      startedAt = 0;
      degraded = false;
      completed = false;
      started = false;
      charge = 1;
      shuffleSeed = Date.now();
      cancelAnimationFrame(raf);
      nextButton.classList.remove("show");
      nextButton.textContent = "下一题";
      sideFill.style.background = "linear-gradient(90deg, #78e872, #31c9ea)";
      renderQuestionText();
      renderSlots();
      renderChoices();
      updateChargeUI();
      setState("", "满电待答", `当前进度 ${mastered}/${questions.length}。点第一个 chunk 后开始掉电，高级完成才会给电池 +1。`);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1100);
    }

    function burstFrom(el) {
      const phoneRect = document.querySelector(".phone").getBoundingClientRect();
      const rect = el.getBoundingClientRect();
      createSpark(rect.left - phoneRect.left + rect.width / 2, rect.top - phoneRect.top + 16, false);
      createSpark(rect.left - phoneRect.left + rect.width / 2 + 16, rect.top - phoneRect.top + 28, false);
    }

    function createSpark(x, y, hot) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = `${x}px`;
      spark.style.top = `${y}px`;
      spark.style.background = hot ? "#ff965c" : "#ffe15a";
      spark.style.boxShadow = hot ? "0 0 12px #ff965c" : "0 0 12px #ffe15a";
      spark.style.setProperty("--dx", `${(Math.random() - .5) * 54}px`);
      spark.style.setProperty("--dy", `${24 + Math.random() * 32}px`);
      document.querySelector(".phone").appendChild(spark);
      setTimeout(() => spark.remove(), 520);
    }

    function reset() {
      selected = [];
      startedAt = 0;
      raf = 0;
      degraded = false;
      completed = false;
      started = false;
      charge = 1;
      mastered = 0;
      queue = [...questions];
      shuffleSeed = Date.now();
      cancelAnimationFrame(raf);
      renderQuestionText();
      renderSlots();
      nextButton.classList.remove("show");
      nextButton.textContent = "下一题";
      topFill.style.background = "linear-gradient(90deg, #80e66f, #2fc7eb)";
      sideFill.style.background = "linear-gradient(90deg, #78e872, #31c9ea)";
      updateProgressUI();
      updateChargeUI();
      renderChoices();
      setState("", "满电待答", "点第一个 chunk 后开始掉电。高级完成才会给右上角电池 +1；普通完成的句子会回到队尾。");
      toast.classList.remove("show");
    }

    durationButtons.forEach(button => {
      button.addEventListener("click", () => {
        durationButtons.forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        duration = Number(button.dataset.duration);
        reset();
      });
    });

    nextButton.addEventListener("click", nextQuestion);
    resetButton.addEventListener("click", reset);
    renderQuestionText();
    renderSlots();
    renderChoices();
    updateProgressUI();
    updateChargeUI();
  </script>
</body>
</html>
